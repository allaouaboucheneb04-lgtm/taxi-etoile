<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Étoile - Contact</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFCA28">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<header class="hero">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="#FFD700">
      <path d="M12 .587l3.668 7.431 8.21 1.194-5.938 5.788 1.402 8.172L12 18.896l-7.342 3.856 1.402-8.172L.122 9.212l8.21-1.194z"/>
    </svg>
    <h1>Taxi Étoile</h1>
  </div>

  <nav class="menu">
    <a href="index.html">Réservation</a>
    <a href="tarifs.html">Tarifs</a>
    <a href="services.html">Services</a>
    <a href="a-propos.html">À propos</a>
    <a class="active" href="contact.html">Contact</a>
    <a href="faq.html">FAQ</a>
    <a href="galerie.html">Galerie</a>
    <a href="politique-confidentialite.html">Confidentialité</a>
    <a href="conditions.html">Conditions</a>
  </nav>

  <select id="themeSelector" class="theme-btn">
    <option value="glass">Glassmorphism</option>
    <option value="dark">Neon Dark</option>
    <option value="material">Material Design</option>
    <option value="simple">Minimaliste</option>
    <option value="taxi">Taxi Branding</option>
  </select>

  <p>Contactez-nous rapidement pour toutes vos demandes</p>
</header>

<div class="container">

  <h2>Contactez-nous</h2>

  <section class="contact-box">
    <h3><i class="fa fa-phone"></i> Téléphone</h3>
    <p>514-464-0121 (Disponible 24/7)</p>
  </section>

  <section class="contact-box">
    <h3><i class="fa fa-envelope"></i> Email</h3>
    <p><a href="mailto:contact@taxi-etoile-montreal.com">contact@taxi-etoile-montreal.com</a></p>
  </section>

  

  <section class="contact-box">
    <h3><i class="fa fa-comment"></i> Formulaire de Contact</h3>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact">
      <p style="display:none"><label>Ne pas remplir : <input name="bot-field"></label></p>

      <div class="input-group"><i class="fa fa-user"></i><input type="text" name="nom" placeholder="Votre nom" required></div>
      <div class="input-group"><i class="fa fa-envelope"></i><input type="email" name="email" placeholder="Votre email" required></div>
      <div class="input-group"><i class="fa fa-comment-alt"></i><textarea name="message" placeholder="Votre message" required></textarea></div>
      <button type="submit">Envoyer</button>
    </form>
  </section>

</div>

<!-- Bouton Installer PWA -->
<button id="installBtn" class="install-btn" style="display:none;">
  📲 Ajouter à l'écran d'accueil
</button>

<script>
/* THEME SWITCHING */
const selector = document.getElementById('themeSelector');
selector.addEventListener('change', () => {
  const theme = selector.value;
  document.body.className = "";
  document.body.classList.add("theme-" + theme);
  localStorage.setItem("theme", theme);
});
const saved = localStorage.getItem("theme");
if (saved) {
  document.body.classList.add("theme-" + saved);
  selector.value = saved;
}

/* PWA INSTALL BUTTON */
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
    installBtn.style.display = 'none';
    deferredPrompt.prompt();
    deferredPrompt = null;
});

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { scope: './' });
}
</script>

</body>
</html>
